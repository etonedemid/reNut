name: Crash Report
description: Used for reporting crashes in game
title: '[Crash]:'
body:
  - type: textarea
    id: Crash
    attributes:
      label: Where did it crash?
      description: Where and what were you doing when the game crashed?
      placeholder: >-
        Please be as specific as possible, you must state where the crash
        happens and provide your save file
      value: >-
        Please be as specific as possible, you must state where the crash
        happens and provide your save file
      render: >-
        Please be as specific as possible, you must state where the crash
        happens and provide your save file
    validations:
      required: true
  - type: markdown
    attributes:
      value: >-
        This template was generated with [Issue Forms
        Creator](https://issue-forms-creator.netlify.app)
